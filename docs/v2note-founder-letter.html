        .letter-body p {

          font-size: 16.5px;
          line-height: 2;
          color: #2C2520;
          margin-bottom: 1.4em;
          text-align: justify;

          margin-top: 60px;
          padding-right: 20px;

          margin: 48px 0;

          width: 4px;
          height: 4px;
          border-radius: 50%;
          background: #C8845C;
          opacity: 0.5;
        }

        .float-sparkle {
          position: fixed;
          pointer-events: none;
          z-index: 0;
        }

        @keyframes float {
          0%, 100% { transform: translateY(0) rotate(0deg); }
          50% { transform: translateY(-10px) rotate(5deg); }
        }

        @keyframes breathe {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-8px); }
        }

          animation: breathe 4s ease-in-out infinite;
        }

          position: relative;

          content: '';
          position: absolute;
          inset: 0;

          pointer-events: none;
          z-index: 0;
        }

          left: 50%;
          transform: translateX(-50%);
          width: 1px;
          height: 80px;
          background: linear-gradient(to bottom, #C8845C44, transparent);
        }

        @media (max-width: 640px) {
          .letter-body p { font-size: 15px; line-height: 1.9; }
        }
