name: Deploy Gateway

on:
  push:
    branches: [main]
    paths:
      - 'gateway/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          debug: true
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            cd gateway
            pnpm install --frozen-lockfile
            pnpm build
            pm2 restart gateway
