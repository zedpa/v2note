name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 同分支只保留最新一次 CI 运行
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (root)
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check (frontend)
        run: npx tsc --noEmit
        # 已知有 test 文件的 TS1501 错误，暂不阻断
        continue-on-error: true

      - name: Install gateway dependencies
        run: cd gateway && pnpm install --frozen-lockfile

      - name: Type check & build (gateway)
        run: cd gateway && pnpm build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Install gateway dependencies
        run: cd gateway && pnpm install --frozen-lockfile

      - name: Run gateway tests
        run: cd gateway && pnpm test

  pitfall-lint:
    name: Pitfall Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pitfall linter
        run: npx tsx scripts/pitfall-lint.ts
