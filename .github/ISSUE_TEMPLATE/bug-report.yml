name: Bug 报告
description: 报告一个 bug 或异常行为
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清楚描述你遇到的问题
      placeholder: "例如：录音完成后，时间线页面没有显示新的记录"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何触发这个问题？
      placeholder: |
        1. 打开应用
        2. 点击录音按钮
        3. 录制 10 秒后停止
        4. 切换到时间线页面
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: 平台
      options:
        - Android
        - iOS
        - Web 浏览器
        - Windows 桌面版
        - Mac 桌面版
        - 鸿蒙 (HarmonyOS)
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: 严重程度
      description: 这个问题对你的影响有多大？
      options:
        - P0 - 完全无法使用
        - P1 - 核心功能异常
        - P2 - 功能有缺陷但可绕过
        - P3 - 小问题 / 美化建议
    validations:
      required: true

  - type: textarea
    id: device
    attributes:
      label: 设备信息
      description: 手机型号、系统版本、应用版本等
      placeholder: "例如：华为 Mate 60 Pro / HarmonyOS 4.0 / v0.1.6"
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: 截图或录屏
      description: 如有截图或录屏请粘贴在此
    validations:
      required: false
